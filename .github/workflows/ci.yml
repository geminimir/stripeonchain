name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, Type-check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stripeonchain_test
          POSTGRES_USER: stripeonchain
          POSTGRES_PASSWORD: stripeonchain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U stripeonchain"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate:up
        env:
          DATABASE_URL: postgres://stripeonchain:stripeonchain_test@localhost:5432/stripeonchain_test

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgres://stripeonchain:stripeonchain_test@localhost:5432/stripeonchain_test
          REDIS_URL: redis://localhost:6379
